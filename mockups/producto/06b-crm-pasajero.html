<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CRM Pasajeros · Plataforma</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/app.js"></script>
<style>body{font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;}</style>
</head>
<body class="flex h-screen bg-slate-50 text-slate-800 text-sm overflow-hidden">
<div id="sidebar"></div>

<!-- Lista de pasajeros -->
<div class="w-72 bg-white border-r border-slate-200 flex flex-col h-screen flex-shrink-0">
  <div class="px-4 pt-4 pb-3 border-b border-slate-100">
    <h1 class="font-semibold text-slate-900 mb-2">CRM · Pasajeros</h1>
    <input id="search-px" placeholder="Buscar pasajero…" class="w-full bg-slate-100 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
  </div>
  <div id="passenger-list" class="flex-1 overflow-y-auto divide-y divide-slate-100"></div>
  <div class="p-3 border-t border-slate-100">
    <a href="06-crm-agencia.html" class="block text-center text-xs text-blue-600 hover:underline">← Ver Agencias</a>
  </div>
</div>

<!-- Detalle pasajero -->
<div class="flex-1 overflow-y-auto">
  <div id="detail" class="flex items-center justify-center h-full text-slate-400 text-sm">
    <div class="text-center">
      <svg class="w-10 h-10 mx-auto mb-2 text-slate-200" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      Seleccioná un pasajero
    </div>
  </div>
</div>

<script>
document.getElementById('sidebar').innerHTML = ui.sidebar('crm');
ui.wireHealth('health-dummy');

let passengers = [], allCases = [], allTags = [];
let activeId = null;

async function init(){
  const crm = await api.get('/crm');
  passengers = crm.pasajeros || [];
  allTags = crm.tags_workspace || [];
  const inbox = await api.get('/inbox');
  allCases = inbox;
  renderList();
  // Si viene de un link directo con ?id=
  const qid = new URLSearchParams(location.search).get('id');
  if(qid) openPassenger(qid);
}

function renderList(){
  const q = document.getElementById('search-px').value.toLowerCase();
  const filtered = passengers.filter(p => !q || p.nombre.toLowerCase().includes(q) || (p.email||'').toLowerCase().includes(q));
  document.getElementById('passenger-list').innerHTML = filtered.map(p => `
    <div class="px-4 py-3 cursor-pointer hover:bg-slate-50 ${activeId===p.id?'bg-blue-50':''}" onclick="openPassenger('${p.id}')">
      <div class="flex items-center gap-2.5">
        ${fmt.avatar(p.nombre)}
        <div class="min-w-0">
          <div class="font-medium text-slate-900 truncate">${p.nombre}</div>
          <div class="text-xs text-slate-500 truncate">${p.email||p.whatsapp||''}</div>
        </div>
      </div>
    </div>
  `).join('') || '<div class="p-4 text-xs text-slate-400 italic">Sin resultados.</div>';
}

function openPassenger(id){
  activeId = id;
  renderList();
  const p = passengers.find(x=>x.id===id);
  if(!p) return;
  const casos = allCases.filter(r=>r.case.contact_id===id);
  const tagMap = Object.fromEntries(allTags.map(t=>[t.id,t]));

  const totalGastado = (p.historial_viajes||[]).reduce((s,v)=>s+(v.monto_usd||0),0);

  document.getElementById('detail').innerHTML = `
  <div class="max-w-3xl mx-auto p-6 space-y-5">

    <!-- Header -->
    <div class="flex items-start justify-between">
      <div class="flex gap-4 items-center">
        ${fmt.avatar(p.nombre)}
        <div>
          <h2 class="text-xl font-semibold text-slate-900">${p.nombre}</h2>
          <div class="text-sm text-slate-500">${p.contacto_principal||''}</div>
        </div>
      </div>
      <span class="text-xs font-medium text-slate-500 bg-slate-100 px-2 py-1 rounded-full">${p.idioma?.toUpperCase()||'ES'}</span>
    </div>

    <!-- Métricas -->
    <div class="grid grid-cols-3 gap-3">
      <div class="bg-white rounded-xl border border-slate-200 p-3 text-center">
        <div class="text-xl font-bold text-slate-900">${(p.historial_viajes||[]).length}</div>
        <div class="text-xs text-slate-500 mt-0.5">Viajes anteriores</div>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-3 text-center">
        <div class="text-xl font-bold text-slate-900">USD ${totalGastado.toLocaleString()}</div>
        <div class="text-xs text-slate-500 mt-0.5">Gasto histórico</div>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-3 text-center">
        <div class="text-xl font-bold text-slate-900">${casos.length}</div>
        <div class="text-xs text-slate-500 mt-0.5">Casos abiertos</div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">

      <!-- Datos de contacto -->
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <div class="text-xs font-semibold text-slate-500 uppercase mb-3">Datos de contacto</div>
        <div class="space-y-2 text-sm">
          ${p.email?`<div class="flex items-center gap-2"><span class="text-slate-400 text-xs">✉</span><span>${p.email}</span></div>`:''}
          ${p.whatsapp?`<div class="flex items-center gap-2"><span class="text-slate-400 text-xs">💬</span><span>${p.whatsapp}</span></div>`:''}
          <div class="flex items-center gap-2"><span class="text-slate-400 text-xs">🌐</span><span>${p.idioma||'es'}</span></div>
          <div class="pt-2 border-t border-slate-100">
            <div class="text-xs font-semibold text-slate-500 mb-1">Consentimiento WA</div>
            <span class="text-xs font-medium ${p.consentimiento_whatsapp?'text-green-600':'text-red-500'}">${p.consentimiento_whatsapp?'✓ Activo desde '+p.consentimiento_fecha:'No registrado'}</span>
          </div>
        </div>
      </div>

      <!-- Historial de viajes -->
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <div class="text-xs font-semibold text-slate-500 uppercase mb-3">Historial de viajes</div>
        ${(p.historial_viajes||[]).length ? p.historial_viajes.map(v=>`
          <div class="flex justify-between items-center py-1.5 border-b border-slate-100 last:border-0">
            <div>
              <div class="font-medium text-sm">${v.destino}</div>
              <div class="text-xs text-slate-500">${v.fecha||''}</div>
            </div>
            <div class="text-sm font-semibold text-slate-700">USD ${(v.monto_usd||0).toLocaleString()}</div>
          </div>`).join('')
        : '<div class="text-xs text-slate-400 italic">Sin viajes registrados.</div>'}
      </div>
    </div>

    <!-- System prompt -->
    <div class="bg-white rounded-xl border border-slate-200 p-4">
      <div class="flex items-center justify-between mb-2">
        <div class="text-xs font-semibold text-slate-500 uppercase">System prompt del cliente
          <span class="normal-case font-normal text-slate-400 ml-1">— lo usa el copiloto al sugerir respuestas</span>
        </div>
        <button onclick="savePrompt('${p.id}')" class="text-xs bg-blue-600 text-white px-3 py-1 rounded-lg hover:bg-blue-700">Guardar</button>
      </div>
      <textarea id="prompt-${p.id}" rows="4"
        class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none">${escapeHtml(p.system_prompt||'')}</textarea>
    </div>

    <!-- Casos activos -->
    <div class="bg-white rounded-xl border border-slate-200 p-4">
      <div class="text-xs font-semibold text-slate-500 uppercase mb-3">Casos activos</div>
      ${casos.length ? casos.map(r=>{
        const c = r.case;
        const caseTags = (c.tags||[]).map(tid=>tagMap[tid]).filter(Boolean);
        return `<a href="03-caso-detalle.html?id=${c.id}" class="flex items-center justify-between py-2 border-b border-slate-100 last:border-0 hover:bg-slate-50 -mx-1 px-1 rounded-lg">
          <div>
            <div class="font-medium text-sm">${c.titulo}</div>
            <div class="flex gap-1.5 mt-1 flex-wrap">
              ${fmt.stageBadge(c.stage)}
              ${fmt.urgencyBadge(c.urgency)}
              ${caseTags.map(t=>`<span class="text-[10px] text-white px-1.5 py-0.5 rounded-full font-medium" style="background:${t.color}">${t.nombre}</span>`).join('')}
            </div>
          </div>
          <span class="text-xs text-slate-400">${fmt.date(c.updated_at)}</span>
        </a>`;
      }).join('') : '<div class="text-xs text-slate-400 italic">Sin casos activos.</div>'}
    </div>

  </div>`;
}

window.savePrompt = async function(id){
  const val = document.getElementById('prompt-'+id)?.value;
  if(val===undefined) return;
  await api.put('/crm/contacts/'+id+'/system_prompt', {system_prompt: val});
  const p = passengers.find(x=>x.id===id);
  if(p) p.system_prompt = val;
  const btn = event.target;
  btn.textContent='Guardado ✓'; btn.className='text-xs bg-green-600 text-white px-3 py-1 rounded-lg';
  setTimeout(()=>{ btn.textContent='Guardar'; btn.className='text-xs bg-blue-600 text-white px-3 py-1 rounded-lg hover:bg-blue-700'; },2000);
};

document.getElementById('search-px').oninput = renderList;
init();
</script>
</body></html>
