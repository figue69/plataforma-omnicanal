<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login · Plataforma</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/app.js"></script>
<style>body{font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;}</style>
</head>
<body class="flex h-screen bg-slate-50 text-slate-800 text-sm overflow-hidden">

<div class="flex-1 flex items-center justify-center">
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8 w-full max-w-sm">

    <!-- Logo -->
    <div class="flex items-center gap-2.5 mb-7">
      <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-base">P</div>
      <div>
        <div class="font-semibold text-slate-900">Plataforma Omnicanal</div>
        <div class="text-xs text-slate-400">Ingresá con tu cuenta</div>
      </div>
    </div>

    <!-- Form -->
    <form id="login-form" class="space-y-3">
      <div>
        <label class="text-xs font-medium text-slate-600 block mb-1">Email</label>
        <input id="email" type="email" placeholder="tu@empresa.com.ar" autocomplete="email"
          class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
      </div>
      <div>
        <label class="text-xs font-medium text-slate-600 block mb-1">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
          class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
      </div>

      <div id="error" class="hidden text-xs text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>

      <button type="submit" id="submit-btn"
        class="w-full bg-slate-900 hover:bg-slate-700 text-white rounded-xl py-2.5 text-sm font-semibold transition-colors mt-1">
        Ingresar
      </button>
    </form>

    <p class="text-xs text-slate-400 mt-5 text-center">Password inicial: <code class="bg-slate-100 px-1.5 py-0.5 rounded">plataforma2026</code></p>
  </div>
</div>

<script>
// Si ya hay sesión válida, ir al inbox directamente
if (localStorage.getItem('jwt_token')) {
  location.href = '02-inbox.html';
}

document.getElementById('login-form').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errorEl = document.getElementById('error');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  btn.textContent = 'Ingresando…';
  btn.disabled = true;
  errorEl.classList.add('hidden');

  try {
    const res = await fetch(window.API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });

    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.detail || 'Email o contraseña incorrectos');
    }

    const { token, agent } = await res.json();

    // Guardar sesión
    localStorage.setItem('jwt_token', token);
    localStorage.setItem('mockup_agent_id', agent.id);
    localStorage.setItem('mockup_agent_name', agent.nombre);

    location.href = '02-inbox.html';
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.classList.remove('hidden');
    btn.textContent = 'Ingresar';
    btn.disabled = false;
  }
};

// Enter en el campo email mueve al password
document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});
</script>
</body></html>
